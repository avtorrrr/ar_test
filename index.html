<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Viewer</title>

  <!-- Three.js + MindAR без A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.154.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }

    #splash {
      position: fixed; inset: 0; z-index: 100;
      background: #0f0f0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 32px; text-align: center;
    }
    #splash.hidden { display: none; }

    .icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #6B5CE7, #4ECDC4);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto;
    }
    .icon svg { width: 36px; height: 36px; }
    h1 { font-size: 22px; font-weight: 600; color: #fff; }
    p  { font-size: 15px; color: #888; line-height: 1.6; max-width: 280px; }
    .btn {
      padding: 16px 40px;
      background: linear-gradient(135deg, #6B5CE7, #4ECDC4);
      color: #fff; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }

    #loading {
      position: fixed; inset: 0; z-index: 90;
      background: #0f0f0f;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; text-align: center; padding: 32px;
    }
    #loading.show { display: flex; }
    .ring {
      width: 52px; height: 52px;
      border: 3px solid #222; border-top-color: #6B5CE7;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 15px; color: #888; }
    #loading-status { font-size: 13px; color: #555; }

    #error {
      position: fixed; inset: 0; z-index: 95;
      background: #0f0f0f;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; text-align: center; padding: 32px;
    }
    #error.show { display: flex; }
    #error h2 { font-size: 20px; color: #fff; }
    #error p  { font-size: 14px; color: #888; max-width: 280px; line-height: 1.6; }
    #error .btn { background: #222; margin-top: 8px; }

    #hint {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: #fff; padding: 12px 24px; border-radius: 100px;
      font-size: 14px; pointer-events: none; z-index: 50;
      white-space: nowrap;
      display: none;
    }
    #hint.show { display: block; }

    #badge {
      position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(78,205,196,0.15); border: 1px solid rgba(78,205,196,0.4);
      color: #4ECDC4; padding: 8px 20px; border-radius: 100px;
      font-size: 14px; font-weight: 600; pointer-events: none; z-index: 50;
      white-space: nowrap; opacity: 0; transition: opacity 0.4s;
    }
    #badge.show { opacity: 1; }

    canvas { display: block; }
  </style>
</head>
<body>

<div id="splash">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <h1>AR Viewer</h1>
  <p>Наведите камеру на карточку — 3D модель появится прямо на ней</p>
  <button class="btn" onclick="startAR()">Открыть камеру</button>
</div>

<div id="loading">
  <div class="ring"></div>
  <p>Загружаем AR…</p>
  <span id="loading-status">Инициализация…</span>
</div>

<div id="error">
  <h2 id="error-title">Ошибка</h2>
  <p id="error-msg">Что-то пошло не так</p>
  <button class="btn" onclick="location.reload()">Попробовать снова</button>
</div>

<div id="hint" class="show">Наведите камеру на маркер</div>
<div id="badge">Маркер найден</div>

<script>
const setStatus = t => document.getElementById('loading-status').textContent = t;

function showError(title, msg) {
  document.getElementById('loading').classList.remove('show');
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error').classList.add('show');
}

async function startAR() {
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('loading').classList.add('show');
  setStatus('Запрос камеры…');

  // Проверяем камеру
  try {
    const s = await navigator.mediaDevices.getUserMedia({ video: true });
    s.getTracks().forEach(t => t.stop());
  } catch(e) {
    showError('Нет доступа к камере', 'Разрешите доступ к камере в настройках браузера и перезагрузите страницу.');
    return;
  }

  setStatus('Запуск MindAR…');

  // ─── НАСТРОЙКИ ───────────────────────────────────
  const MODEL_URL  = 'model.glb';     // ← имя вашего GLB файла
  const TARGET_URL = 'targets.mind';  // ← скомпилированный маркер
  const MODEL_SCALE    = 0.15;        // ← размер модели
  const MODEL_POSITION = [0, 0, 0];   // ← сдвиг [x, y, z]
  const MODEL_ROTATION = [0, 0, 0];   // ← поворот в градусах [x, y, z]
  // ─────────────────────────────────────────────────

  let mindarThree;
  try {
    mindarThree = new window.MINDAR.IMAGE.MindARThree({
      container: document.body,
      imageTargetSrc: TARGET_URL,
      uiLoading: 'no',
      uiScanning: 'no',
      uiError: 'no',
    });
  } catch(e) {
    showError('Ошибка MindAR', e.message);
    return;
  }

  const { renderer, scene, camera } = mindarThree;

  // Освещение
  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(1, 2, 1);
  scene.add(dirLight);

  // Якорь на маркер
  const anchor = mindarThree.addAnchor(0);

  // Загрузка GLB
  setStatus('Загрузка 3D модели…');
  try {
    const loader = new THREE.GLTFLoader();
    const gltf = await new Promise((res, rej) => {
      loader.load(MODEL_URL, res, undefined, rej);
    });

    const model = gltf.scene;
    model.scale.setScalar(MODEL_SCALE);
    model.position.set(...MODEL_POSITION);
    model.rotation.set(
      THREE.MathUtils.degToRad(MODEL_ROTATION[0]),
      THREE.MathUtils.degToRad(MODEL_ROTATION[1]),
      THREE.MathUtils.degToRad(MODEL_ROTATION[2])
    );
    anchor.group.add(model);

    // Анимации если есть
    if (gltf.animations && gltf.animations.length > 0) {
      const mixer = new THREE.AnimationMixer(model);
      gltf.animations.forEach(clip => mixer.clipAction(clip).play());
      const clock = new THREE.Clock();
      renderer.setAnimationLoop(() => {
        mixer.update(clock.getDelta());
        mindarThree.renderer.render(scene, camera);
      });
    }
  } catch(e) {
    showError('Ошибка загрузки модели', 'Проверьте что файл model.glb лежит рядом с index.html. Ошибка: ' + e.message);
    return;
  }

  // События маркера
  anchor.onTargetFound = () => {
    document.getElementById('hint').classList.remove('show');
    document.getElementById('badge').classList.add('show');
    setTimeout(() => document.getElementById('badge').classList.remove('show'), 2000);
  };
  anchor.onTargetLost = () => {
    document.getElementById('hint').classList.add('show');
  };

  // Старт
  setStatus('Запуск камеры…');
  try {
    await mindarThree.start();
  } catch(e) {
    showError('Ошибка запуска', e.message);
    return;
  }

  document.getElementById('loading').classList.remove('show');
  document.getElementById('hint').classList.add('show');

  renderer.setAnimationLoop(() => {
    renderer.render(scene, camera);
  });
}
</script>
</body>
</html>
