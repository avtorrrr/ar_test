<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Viewer</title>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar-nft.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }

    #splash {
      position: fixed; inset: 0; z-index: 100;
      background: #0f0f0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 32px; text-align: center;
    }
    #splash.hidden { display: none; }
    .icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #6B5CE7, #4ECDC4);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 36px; height: 36px; }
    h1 { font-size: 22px; font-weight: 600; color: #fff; }
    .desc { font-size: 15px; color: #888; line-height: 1.6; max-width: 280px; }
    .btn {
      padding: 16px 40px;
      background: linear-gradient(135deg, #6B5CE7, #4ECDC4);
      color: #fff; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }

    #found-badge {
      position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(78,205,196,0.2); border: 1px solid rgba(78,205,196,0.5);
      color: #4ECDC4; padding: 8px 20px; border-radius: 100px;
      font-size: 14px; font-weight: 600;
      opacity: 0; transition: opacity 0.4s;
      pointer-events: none; z-index: 20; white-space: nowrap;
    }
    #found-badge.visible { opacity: 1; }

    #hint {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: #fff; padding: 12px 24px; border-radius: 100px;
      font-size: 14px; pointer-events: none; z-index: 10;
      display: none;
    }
    #hint.show { display: block; }

    a-scene { width: 100vw !important; height: 100vh !important; }
  </style>
</head>
<body>

<div id="splash">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <h1>AR Viewer</h1>
  <p class="desc">Наведите камеру на карточку — 3D модель появится прямо на ней</p>
  <button class="btn" onclick="startAR()">Открыть камеру</button>
</div>

<div id="found-badge">Маркер найден</div>
<div id="hint">Наведите камеру на маркер</div>

<!--
  AR.js NFT (Natural Feature Tracking) — распознаёт обычные картинки без QR-рамок.
  Нужны 3 файла маркера: marker.fset, marker.fset3, marker.iset
  Генерировать здесь: https://carnaux.github.io/NFT-Marker-Creator/
-->
<a-scene
  id="ar-scene"
  embedded
  arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
  renderer="logarithmicDepthBuffer: true; antialias: true;"
  vr-mode-ui="enabled: false"
  style="display: none;"
>
  <a-nft
    id="nft-target"
    type="nft"
    url="marker/marker"
    smooth="true"
    smoothCount="10"
    smoothTolerance="0.01"
    smoothThreshold="5"
  >
    <!--
      smooth="true" + smoothCount="10" — главное от дрожания в AR.js
      Меняйте параметры модели здесь:
    -->
    <a-entity
      gltf-model="model.glb"
      position="0 0 0"
      rotation="90 0 0"
      scale="0.01 0.01 0.01"
      animation-mixer
    ></a-entity>
  </a-nft>

  <a-entity camera></a-entity>
</a-scene>

<script>
function startAR() {
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('ar-scene').style.display = 'block';
  document.getElementById('hint').classList.add('show');

  const scene = document.querySelector('a-scene');

  const init = () => {
    const nft = document.getElementById('nft-target');
    if (!nft) return;

    nft.addEventListener('markerFound', () => {
      document.getElementById('hint').classList.remove('show');
      const b = document.getElementById('found-badge');
      b.classList.add('visible');
      setTimeout(() => b.classList.remove('visible'), 2000);
    });

    nft.addEventListener('markerLost', () => {
      document.getElementById('hint').classList.add('show');
    });
  };

  if (scene.hasLoaded) init();
  else scene.addEventListener('loaded', init);
}
</script>
</body>
</html>
