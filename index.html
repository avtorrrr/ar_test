<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }

    #splash {
      position: fixed; inset: 0; z-index: 100;
      background: #0f0f0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 32px;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .splash-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #6B5CE7, #4ECDC4);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
    }
    .splash-icon svg { width: 36px; height: 36px; }
    .splash-title { font-size: 22px; font-weight: 600; color: #fff; text-align: center; }
    .splash-desc { font-size: 15px; color: #888; text-align: center; line-height: 1.6; max-width: 280px; }
    .start-btn {
      padding: 16px 40px;
      background: linear-gradient(135deg, #6B5CE7, #4ECDC4);
      color: #fff; border: none; border-radius: 14px;
      font-size: 16px; font-weight: 600; cursor: pointer;
    }

    #hint {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: #fff; padding: 12px 24px; border-radius: 100px;
      font-size: 14px; pointer-events: none; z-index: 10;
      transition: opacity 0.5s;
    }
    #hint.hidden { opacity: 0; }

    #found-badge {
      position: fixed; top: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(78,205,196,0.2); border: 1px solid rgba(78,205,196,0.5);
      color: #4ECDC4; padding: 8px 20px; border-radius: 100px;
      font-size: 14px; font-weight: 600;
      opacity: 0; transition: opacity 0.4s;
      pointer-events: none; z-index: 20; white-space: nowrap;
    }
    #found-badge.visible { opacity: 1; }

    a-scene { width: 100vw !important; height: 100vh !important; }
  </style>
</head>
<body>

<div id="splash">
  <div class="splash-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <div class="splash-title">AR Viewer</div>
  <div class="splash-desc">Наведите камеру на карточку — 3D модель появится прямо на ней</div>
  <button class="start-btn" onclick="startAR()">Открыть камеру</button>
</div>

<div id="hint" class="hidden">Наведите камеру на маркер</div>
<div id="found-badge">Маркер найден</div>

<a-scene
  id="ar-scene"
  mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiScanning: no; uiError: no;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  style="display:none"
>
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <!--
      Меняйте эти параметры под вашу модель:
      scale — размер (1 = размер маркера, 0.5 = половина маркера)
      rotation — поворот в градусах
      position — смещение (третье число = высота над маркером)
    -->
    <a-gltf-model
      src="model.glb"
      position="0 0 0.3"
      rotation="0 0 0"
      scale="1 1 1"
      animation-mixer
    ></a-gltf-model>
  </a-entity>

</a-scene>

<script>
function startAR() {
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('ar-scene').style.display = 'block';
  document.getElementById('hint').classList.remove('hidden');

  const scene = document.querySelector('a-scene');

  const launch = () => {
    const sys = scene.systems['mindar-image-system'];
    if (sys) sys.start();

    const target = document.querySelector('[mindar-image-target]');
    if (target) {
      target.addEventListener('targetFound', () => {
        document.getElementById('hint').classList.add('hidden');
        const b = document.getElementById('found-badge');
        b.classList.add('visible');
        setTimeout(() => b.classList.remove('visible'), 2000);
      });
      target.addEventListener('targetLost', () => {
        document.getElementById('hint').classList.remove('hidden');
      });
    }
  };

  if (scene.hasLoaded) {
    launch();
  } else {
    scene.addEventListener('loaded', launch);
  }
}
</script>
</body>
</html>
